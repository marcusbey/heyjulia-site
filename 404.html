<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — HeyJulia</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
  <div class="cursor" aria-hidden="true">
    <span class="cursor__dot"></span>
    <span class="cursor__ring"></span>
  </div>

  <section class="hero" style="min-height:100vh; display:grid; place-items:center; padding-top: 0;">
    <h2 class="ghost" aria-hidden="true">404</h2>
    <div class="hero__inner" style="text-align:center; max-width: 720px;">
      <p class="hero__eyebrow" style="margin-left:auto; margin-right:auto;">
        <span class="dot"></span>
        Page not found
      </p>
      <h1 class="hero__title" style="max-width:none;">
        This page is <em>off-plan.</em>
      </h1>
      <p class="hero__sub" style="margin-left:auto; margin-right:auto;">
        Julia didn't log this one. Let's get you back to a place that's tracked.
      </p>
      <div class="hero__ctas" style="justify-content:center;">
        <a href="/" class="btn btn--primary" data-cursor="button">
          <span>Back to HeyJulia</span>
          <span class="btn__arrow">→</span>
        </a>
        <a href="tel:+13868002414" class="btn btn--ghost" data-cursor="link">
          <span class="btn__dot"></span>
          Call (386) 800-2414
        </a>
      </div>
    </div>
  </section>

  <script src="assets/js/main.js" defer></script>
</body>
</html>
